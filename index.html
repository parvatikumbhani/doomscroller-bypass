<!DOCTYPE html>
<html>
<head>
  <title>Doomscroll Bypass – Desktop</title>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      font-family: "Inter", sans-serif;
      color: #fff;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* MAIN LAYOUT */
    .left-panel {
      width: 60%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
      box-sizing: border-box;
    }

    .right-panel {
      width: 40%;
      background: #181818;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
      border-left: 1px solid #333;
    }

    /* VIDEO PLAYER */
    .video-wrapper {
      position: relative;
      width: 360px;
      height: 640px;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    #shorts-container {
      width: 100%;
      height: 100%;
    }

    /* ACTION BUTTONS (vertical) */
    .action-bar {
      position: absolute;
      right: -70px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      opacity: 0.9;
    }

    .action-btn:hover {
      opacity: 1;
    }

    .action-btn svg {
      width: 32px;
      height: 32px;
      fill: white;
    }

    /* TITLE + CHANNEL INFO */
    .video-info {
      width: 360px;
      margin-top: 15px;
    }

    .video-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .channel-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .channel-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #444;
    }

    .subscribe-btn {
      padding: 6px 14px;
      background: #cc0000;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
    }

    /* SEARCH BAR */
    #searchBar {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #303030;
      color: #fff;
      font-size: 15px;
      margin-bottom: 20px;
    }

    /* SEARCH RESULTS */
    .result-item {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      cursor: pointer;
      padding: 10px;
      border-radius: 8px;
      transition: 0.2s;
    }

    .result-item:hover {
      background: #2a2a2a;
    }

    .result-thumb {
      width: 160px;
      border-radius: 8px;
    }

    .result-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .result-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .result-channel {
      font-size: 13px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <!-- LEFT SIDE (PLAYER) -->
  <div class="left-panel">
    <div class="video-wrapper">
      <div id="shorts-container"></div>

      <!-- VERTICAL ACTION BUTTONS -->
      <div class="action-bar">
        <div class="action-btn" onclick="likeVideo()">
          <svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-6 0v4H5v12h14V9h-5z"/></svg>
        </div>

        <div class="action-btn" onclick="dislikeVideo()">
          <svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 6 0v-4h3V3H5v12h5z"/></svg>
        </div>

        <div class="action-btn">
          <svg viewBox="0 0 24 24"><path d="M12 22c5.421 0 10-4.579 10-10S17.421 2 12 2 2 6.579 2 12s4.579 10 10 10zm-1-7v-6l5 3-5 3z"/></svg>
        </div>

        <div class="action-btn">
          <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12l7.13-4.85A2.99 2.99 0 0 0 18 7.92a3 3 0 1 0-3-3c0 .76.3 1.44.77 1.96L8.91 10l7.13 4.85c-.47.52-.77 1.2-.77 1.96a3 3 0 1 0 3-3z"/></svg>
        </div>

        <div class="action-btn">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
        </div>
      </div>
    </div>

    <!-- TITLE + CHANNEL INFO -->
    <div class="video-info">
      <div class="video-title" id="videoTitle">Loading...</div>

      <div class="channel-row">
        <div class="channel-avatar"></div>
        <div id="channelName">Channel</div>
        <div class="subscribe-btn">Subscribe</div>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDE (SEARCH SIDEBAR) -->
  <div class="right-panel">
    <input id="searchBar" placeholder="Search videos..." onkeydown="if(event.key==='Enter') searchShorts()">
    <div id="resultsList"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="script.js"></script>

</body>
</html>
