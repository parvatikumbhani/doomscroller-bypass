<!DOCTYPE html>
<html>
<head>
  <title>Doomscroll Bypass – Shorts Player</title>

  <style>
    @font-face {
      font-family: "Starborn";
      src: url("fonts/Starborn.otf") format("opentype");
    }

    body {
      margin: 0;
      background: #050509;
      font-family: "Inter", sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .app-wrapper {
      width: 420px;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .app-title {
      font-family: "Starborn", sans-serif;
      font-size: 32px;
      background: linear-gradient(
        90deg,
        #ff4d4d,
        #ff7f50,
        #ffd700,
        #7fff00,
        #00bfff,
        #8a2be2,
        #ff4dff,
        #ff4d4d
      );
      background-size: 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleRainbow 7s linear infinite;
      text-align: center;
    }

    @keyframes titleRainbow {
      0% { background-position: 0% }
      100% { background-position: 400% }
    }

    .subtitle {
      font-size: 13px;
      color: #b3b3b3;
      text-align: center;
    }

    #searchBar {
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: none;
      outline: none;
      font-size: 14px;
      background: #15151c;
      color: #fff;
      box-shadow: 0 0 0 1px #262636;
    }

    .results-list {
      width: 100%;
      max-height: 260px;
      overflow-y: auto;
      margin-top: 6px;
    }

    .result-item {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #11121a;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .result-item:hover {
      background: #1a1b25;
    }

    .result-thumb {
      width: 120px;
      border-radius: 10px;
    }

    .result-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .result-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .result-channel {
      font-size: 12px;
      opacity: 0.7;
    }

    .shorts-shell {
      position: relative;
      width: 360px;
      height: 640px;
      border-radius: 24px;
      overflow: hidden;
      background: radial-gradient(circle at top, #1b1b2b, #050509);
      box-shadow: 0 18px 40px rgba(0,0,0,0.7);
    }

    #shorts-container {
      width: 100%;
      height: 100%;
    }

    .info-overlay {
      position: absolute;
      left: 14px;
      bottom: 70px;
      right: 70px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    }

    .video-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .channel-name {
      font-size: 12px;
      opacity: 0.85;
    }

    .actions {
      position: absolute;
      right: 10px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .action-icon {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .nav-buttons {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    .nav-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: none;
      font-size: 12px;
      cursor: pointer;
      background: rgba(0,0,0,0.7);
      color: #fff;
      backdrop-filter: blur(6px);
    }

    .credit {
      margin-top: 6px;
      font-size: 11px;
      color: #888ca0;
    }
  </style>
</head>

<body>
  <div class="app-wrapper">
    <div class="app-title">Doomscroll Bypass</div>
    <div class="subtitle">A vertical Shorts feed to break the scroll loop.</div>

    <input id="searchBar" placeholder="Search videos..." onkeydown="if(event.key==='Enter') searchShorts()">

    <div id="resultsList" class="results-list"></div>

    <div class="shorts-shell">
      <div id="shorts-container"></div>

      <div class="info-overlay">
        <div class="video-title" id="videoTitle">Loading...</div>
        <div class="channel-name" id="channelName"></div>
      </div>

      <div class="actions">
        <div class="action-btn"><div class="action-icon">❤️</div><div>Like</div></div>
        <div class="action-btn"><div class="action-icon">💬</div><div>Comments</div></div>
        <div class="action-btn"><div class="action-icon">↗</div><div>Share</div></div>
      </div>

      <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn" onclick="prevShort()">Prev</button>
        <button class="nav-btn" id="nextBtn" onclick="nextShort()">Next</button>
      </div>
    </div>

    <div class="credit">Created by: YOUR_CHANNEL_NAME</div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="script.js"></script>
</body>
</html>
